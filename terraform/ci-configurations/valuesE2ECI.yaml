imagePullPolicy: IfNotPresent

app:
  name: "Theia with Theia Extension Monitor"

issuer:
  email: jdoe@theia-cloud.io

demoApplication:
  install: false

hosts:
  usePaths: false
  allWildcardInstances: ["*.webview."]
  configuration:
    baseHost: 192.168.39.173.nip.io

landingPage:
  image: theiacloud/theia-cloud-landing-page:minikube-ci-e2e
  appDefinition: "theia-cloud-monitor-theia-popup"
  ephemeralStorage: true
  additionalApps:
    theia-cloud-monitor-theia-popup:
      label: "Theia Monitor (Popup Test)"
    theia-cloud-monitor-theia-timeout:
      label: "Theia Monitor (Timeout Test)"
    theia-cloud-monitor-vscode-popup:
      label: "VSCode Monitor (Popup Test)"
    theia-cloud-monitor-vscode-timeout:
      label: "VSCode Monitor (Timeout Test)"
    theia-cloud-demo:
      label: "Theia Cloud Demo (2min timeout)"

keycloak:
  enable: false
  authUrl: "https://keycloak.url/auth/"

operator:
  image: theiacloud/theia-cloud-operator:minikube-ci-e2e
  cloudProvider: "MINIKUBE"
  bandwidthLimiter: "WONDERSHAPER"
  wondershaperImage: theiacloud/theia-cloud-wondershaper:minikube-ci-e2e
  sessionsPerUser: "1"
  storageClassName: "default"
  requestedStorage: "250Mi"
  replicas: 2

service:
  image: theiacloud/theia-cloud-service:minikube-ci-e2e

ingress:
  certManagerAnnotations: true
  clusterIssuer: theia-cloud-selfsigned-issuer
  theiaCloudCommonName: true
  tls: true
  addTLSSecretName: true

monitor:
  enable: true
  activityTracker:
    enable: true
    interval: 1

preloading:
  enable: true
  images: []
