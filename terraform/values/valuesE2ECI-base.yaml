# Shared CI Helm values for the e2e workflows. Combined with one of:
#   - valuesE2ECI-minikube.yaml  (consumed by terraform/ci-configurations/)
#   - valuesE2ECI-openshift.yaml (consumed by terraform/test-configurations/5-02_openshift_ci/)
#
# The platform overlay is applied AFTER this base, so any value set in
# both wins from the overlay.

app:
  name: "Theia with Theia Extension Monitor"

issuer:
  email: jdoe@theia-cloud.io

demoApplication:
  install: false

hosts:
  usePaths: false

landingPage:
  appDefinition: "theia-cloud-monitor-theia-popup"
  ephemeralStorage: true
  additionalApps:
    theia-cloud-monitor-theia-popup:
      label: "Theia Monitor (Popup Test)"
    theia-cloud-monitor-theia-timeout:
      label: "Theia Monitor (Timeout Test)"
    theia-cloud-monitor-vscode-popup:
      label: "VSCode Monitor (Popup Test)"
    theia-cloud-monitor-vscode-timeout:
      label: "VSCode Monitor (Timeout Test)"
    theia-cloud-demo:
      label: "Theia Cloud Demo (2min timeout)"

operator:
  bandwidthLimiter: "WONDERSHAPER"
  sessionsPerUser: "1"
  requestedStorage: "250Mi"
  replicas: 2

monitor:
  enable: true
  activityTracker:
    enable: true
    interval: 1

preloading:
  enable: true
  images: []
